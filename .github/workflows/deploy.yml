name: Deploy to Sakura Internet (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm run generate

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        env:
          FTP_HOST:       ${{ secrets.FTP_HOST }}
          FTP_USER:       ${{ secrets.FTP_USER }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          FTP_IP=$(dig +short "$FTP_HOST" | head -1)

          # ~/.lftprc にパスワードを書き込み、シェル展開を回避
          cat > ~/.lftprc << LFTPRC
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          LFTPRC

          # netrc でパスワードを渡す（特殊文字も安全）
          cat > ~/.netrc << NETRC
          machine $FTP_IP
          login $FTP_USER
          password $FTP_PASSWORD
          NETRC
          chmod 600 ~/.netrc

          lftp -c "
            open ftp://$FTP_IP;
            mirror --reverse --delete --verbose \
              --exclude .htaccess \
              --exclude-glob old/ \
              .output/public/ $FTP_REMOTE_DIR;
            bye
          "

      - name: Done
        run: echo "✅ Deployed to https://domisan.sakura.ne.jp/"

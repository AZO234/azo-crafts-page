name: Deploy to Sakura Internet (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # curl で生のFTP通信を確認（最もシンプルな接続テスト）
      - name: FTP login test with curl
        env:
          FTP_HOST:     ${{ secrets.FTP_HOST }}
          FTP_USER:     ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          FTP_IP=$(dig +short "$FTP_HOST" | head -1)
          echo "IP: $FTP_IP"
          # curl でFTPログインして PWD だけ実行
          curl -v \
            --ftp-ssl-reqd false \
            --insecure \
            --user "$FTP_USER:$FTP_PASSWORD" \
            "ftp://$FTP_IP/" \
            --quote "PWD" \
            2>&1 | grep -E "< |> |Connected|Login|530|220|331|230|Error|curl"

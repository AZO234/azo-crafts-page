name: Deploy to Sakura Internet (FTP) - DEBUG

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Test plain FTP (no TLS)
        env:
          FTP_HOST:     ${{ secrets.FTP_HOST }}
          FTP_USER:     ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 -c "
          import os
          host = os.environ['FTP_HOST']
          user = os.environ['FTP_USER']
          pw   = os.environ['FTP_PASSWORD']
          with open('/tmp/lftp_plain', 'w') as f:
              f.write('set ftp:ssl-allow no\n')
              f.write('set ftp:ssl-force no\n')
              f.write('set ftp:passive-mode yes\n')
              f.write('set net:timeout 15\n')
              f.write('set net:max-retries 1\n')
              f.write(f'open ftp://{host}\n')
              f.write(f'user {user} {pw}\n')
              f.write('pwd\n')
              f.write('bye\n')
          "
          lftp -d -f /tmp/lftp_plain 2>&1
          rm -f /tmp/lftp_plain

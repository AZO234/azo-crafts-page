name: Deploy to Sakura Internet (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm run generate

      # lftp で FTP デプロイ
      # SamKirkland/FTP-Deploy-Action より互換性が高い
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        env:
          FTP_HOST:       ${{ secrets.FTP_HOST }}
          FTP_USER:       ${{ secrets.FTP_USER }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '$FTP_USER','$FTP_PASSWORD' ftp://$FTP_HOST;
            mirror --reverse --delete --verbose \
              --exclude .htaccess \
              --exclude-glob old/ \
              .output/public/ $FTP_REMOTE_DIR;
            bye
          "

      - name: Done
        run: echo "✅ Deployed to https://domisan.sakura.ne.jp/"
